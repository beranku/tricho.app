# SOPS creation rules — maps each encrypted file under secrets/ to the age
# recipients allowed to decrypt it.
#
# To add yourself as a recipient:
#   1. Generate an age keypair:     age-keygen -o ~/.config/sops/age/keys.txt
#   2. Copy the public line ("# public key: ...") into the recipient list of
#      every profile you need access to.
#   3. Re-encrypt:                  make secrets-rotate-age
#
# To remove yourself:
#   1. Delete your public line from the rules below.
#   2. Someone with active access runs `make secrets-rotate-age`.
#   3. Rotate any secret you knew (CouchDB admin password, OAuth client
#      secrets, JWT private key) per the procedure in secrets/README.md.

creation_rules:
  - path_regex: secrets/dev\.sops\.yaml$
    key_groups:
      - age:
          - age122p0m0nhdlz0ehagm8npdp4lhafzlezpm9xxsuvm0j0prx0cypqq0k32g7  # honza (laptop)

  - path_regex: secrets/ci\.sops\.yaml$
    key_groups:
      - age:
          # Dev is (temporarily) also a CI recipient so initial bootstrap
          # can author ci.sops.yaml. A dedicated CI-only keypair lives in
          # the SOPS_AGE_KEY GitHub Actions secret once configured.
          - age122p0m0nhdlz0ehagm8npdp4lhafzlezpm9xxsuvm0j0prx0cypqq0k32g7  # honza (laptop)

  - path_regex: secrets/prod\.sops\.yaml$
    key_groups:
      - age:
          # Production recipients — kept narrow. Break-glass key stored in
          # a password manager.
          # Example:
          #   - age1prod...          # production host
          #   - age1breakglass...    # password-manager-stored recovery

  # Server-deploy sync profiles. One file per environment hosted on the
  # deploy server (see docs/server-deploy.md). Recipients:
  #   - the operator's laptop key (so render works locally too)
  #   - the per-server age key on the host that runs the deploy
  #     (private at /etc/sops/age/<hostname>.key, mode 0600, root-only)
  # When decommissioning a host, remove its public key here AND run
  # `make secrets-rotate-age` so the decommissioned key cannot decrypt
  # past or future revisions.
  - path_regex: secrets/sync-prod\.sops\.yaml$
    key_groups:
      - age:
          - age122p0m0nhdlz0ehagm8npdp4lhafzlezpm9xxsuvm0j0prx0cypqq0k32g7  # honza (laptop)
          # - age1o3...            # o3.tricho.app — added after `infrastructure/server/bootstrap.sh`

  - path_regex: secrets/sync-dev\.sops\.yaml$
    key_groups:
      - age:
          - age122p0m0nhdlz0ehagm8npdp4lhafzlezpm9xxsuvm0j0prx0cypqq0k32g7  # honza (laptop)
          # - age1o3...            # o3.tricho.app
