name: CI/CD

on:
  push:
    # `main` ships production (https://tricho.app); `dev` ships the staging
    # branch alias on Cloudflare Pages. The `--branch` flag below tags each
    # deploy so Cloudflare creates a stable per-branch URL — the dashboard
    # custom-domain mapping (e.g. dev.tricho.app → branch=dev) is a one-time
    # setup outside CI.
    branches: [main, dev]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.filter.outputs.web }}
      app: ${{ steps.filter.outputs.app }}
      shared: ${{ steps.filter.outputs.shared }}
      backend: ${{ steps.filter.outputs.backend }}
      infra: ${{ steps.filter.outputs.infra }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            web:
              - 'web/**'
            app:
              - 'app/**'
            shared:
              - 'shared/**'
            backend:
              - 'infrastructure/**'
              - 'app/vitest.config.backend.ts'
            infra:
              - 'scripts/**'
              - '_headers'
              - '_redirects'
              - '.github/workflows/ci.yml'

  test-web:
    name: Test web
    needs: changes
    # Skip when no web/shared/infra files changed. The `dorny/paths-filter`
    # step computes diffs correctly on push events too, so we no longer need
    # the `github.event_name == 'push'` blanket override that previously
    # forced this job to run on every push.
    if: needs.changes.outputs.web == 'true' || needs.changes.outputs.shared == 'true' || needs.changes.outputs.infra == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/dist
          retention-days: 7

  test-app:
    name: Test app
    needs: changes
    # Skip when no app/shared/infra files changed. The `build-and-deploy`
    # job's "Build app (if not already built)" step rebuilds the PWA shell
    # inline when this job is skipped, so the merged dist is still complete.
    if: needs.changes.outputs.app == 'true' || needs.changes.outputs.shared == 'true' || needs.changes.outputs.infra == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build
        env:
          GITHUB_SHA: ${{ github.sha }}
      - uses: actions/upload-artifact@v4
        with:
          name: app-dist
          path: app/dist
          retention-days: 7

  test-backend:
    name: Test backend
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.infra == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
        working-directory: app
      - run: npm ci
        working-directory: infrastructure/couchdb/tricho-auth
      - run: npm install
        working-directory: infrastructure/mock-oidc
      - run: npm run test:backend
        working-directory: app

  build-and-deploy:
    name: Build merged dist & deploy
    needs: [changes, test-web, test-app, test-backend]
    if: |
      always() &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # If a side rebuilt, download its artifact. Otherwise rebuild it locally
      # so the merged dist/ is always whole-site even on path-filtered runs.
      - name: Download web artifact (if available)
        if: needs.test-web.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web/dist
      - name: Build web (if not already built)
        if: needs.test-web.result != 'success'
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Download app artifact (if available)
        if: needs.test-app.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: app-dist
          path: app/dist
      - name: Build app (if not already built)
        if: needs.test-app.result != 'success'
        working-directory: app
        env:
          GITHUB_SHA: ${{ github.sha }}
        run: |
          npm ci
          npm run build

      - name: Merge into dist/
        run: node scripts/merge-dist.mjs

      - name: Validate build
        run: node scripts/validate-build.mjs

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >-
            pages deploy dist
            --project-name=tricho
            --branch=${{ github.head_ref || github.ref_name }}
            --commit-hash=${{ github.sha }}

      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request' && steps.deploy.outcome == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy.outputs.deployment-url }}';
            const alias = '${{ steps.deploy.outputs.pages-deployment-alias-url }}';
            const sha = context.sha.slice(0, 7);
            const body = [
              '🚀 **Preview deployed**',
              '',
              `- Deployment: ${url}`,
              alias ? `- Branch alias: ${alias}` : '',
              '',
              `_Commit: ${sha}_`,
            ].filter(Boolean).join('\n');
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
