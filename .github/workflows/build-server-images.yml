name: Build server images

# Builds and pushes the two server-side container images to GHCR:
#   - ghcr.io/beranku/tricho-auth     (from infrastructure/couchdb/tricho-auth/Dockerfile)
#   - ghcr.io/beranku/tricho-couchdb  (from infrastructure/couchdb/Dockerfile)
#
# Both images are signed via cosign keyless (GitHub OIDC → Sigstore Fulcio).
# The deploy host MUST `cosign verify` before pulling — see deploy-server.yml.
#
# Tagging:
#   sha-<full-sha>   immutable primary tag (used by deploy)
#   <branch>         mutable alias for human browsing (NOT consumed by deploy)
#
# Native ARM64 build on github-hosted ubuntu-24.04-arm runner. No QEMU.

on:
  workflow_dispatch: {}
  push:
    branches: [main, dev]
    paths:
      - 'infrastructure/couchdb/**'
      # Include sync compose so image-format-only changes (e.g. compose
      # secret syntax) get a matching SHA tag for the deploy step.
      - 'infrastructure/server/sync/compose.yml'
      - '.github/workflows/build-server-images.yml'

concurrency:
  # Allow concurrent builds on different SHAs to overlap; per-SHA the
  # pre-push existence check makes a re-run a no-op anyway.
  group: build-server-images-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.image.name }}
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
      id-token: write   # cosign keyless OIDC

    strategy:
      fail-fast: false
      matrix:
        image:
          - name: tricho-auth
            context: infrastructure/couchdb/tricho-auth
            dockerfile: infrastructure/couchdb/tricho-auth/Dockerfile
          - name: tricho-couchdb
            # The CouchDB Dockerfile lives at infrastructure/couchdb/Dockerfile
            # and pulls in the entrypoint shim + local.ini from the same dir.
            context: infrastructure/couchdb
            dockerfile: infrastructure/couchdb/Dockerfile

    steps:
      - uses: actions/checkout@v4

      # Tags: immutable sha-<full> (primary) + mutable branch alias.
      # Per server-image-pipeline spec, deploy step rejects mutable tags as
      # the IMAGE_REF — the branch alias is human-browsing only.
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/beranku/${{ matrix.image.name }}
          tags: |
            type=sha,prefix=sha-,format=long
            type=ref,event=branch

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Pre-push existence check — re-running for the same SHA is a no-op.
      # Per server-image-pipeline spec, the immutable sha-<sha> tag MUST NOT
      # be overwritten.
      - id: existence
        name: Check whether sha tag already exists
        run: |
          set -eu
          target="ghcr.io/beranku/${{ matrix.image.name }}:sha-${{ github.sha }}"
          if docker manifest inspect "$target" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "::notice::$target already pushed; skipping build"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - id: build
        if: steps.existence.outputs.exists == 'false'
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.dockerfile }}
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          # Cache uses GHA's per-repo OCI cache.
          cache-from: type=gha,scope=${{ matrix.image.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image.name }}

      - if: steps.existence.outputs.exists == 'false'
        uses: sigstore/cosign-installer@v3

      - if: steps.existence.outputs.exists == 'false'
        name: Cosign sign (keyless via GH OIDC)
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          set -eu
          digest='${{ steps.build.outputs.digest }}'
          cosign sign --yes "ghcr.io/beranku/${{ matrix.image.name }}@${digest}"
          echo "::notice::signed ghcr.io/beranku/${{ matrix.image.name }}@${digest}"

      - name: Summary
        run: |
          {
            echo "## ${{ matrix.image.name }}"
            echo
            echo "- tag: \`sha-${{ github.sha }}\`"
            if [ "${{ steps.existence.outputs.exists }}" = "true" ]; then
              echo "- status: **already pushed** (idempotent re-run)"
            else
              echo "- status: **built + signed**"
              echo "- digest: \`${{ steps.build.outputs.digest }}\`"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
