name: Tests (pyramid matrix)

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Change-detection so tiers only run when their inputs changed ──────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      src: ${{ steps.filter.outputs.src }}
      components: ${{ steps.filter.outputs.components }}
      backend: ${{ steps.filter.outputs.backend }}
      infra: ${{ steps.filter.outputs.infra }}
      tests: ${{ steps.filter.outputs.tests }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            src:
              - 'src/**'
              - 'package.json'
              - 'package-lock.json'
              - 'vitest.config.*.ts'
            components:
              - 'src/components/**'
              - 'src/test/**'
              - 'package.json'
              - 'vitest.config.component.ts'
            backend:
              - 'infrastructure/couchdb/tricho-auth/**'
              - 'infrastructure/mock-oidc/**'
              - 'vitest.config.backend.ts'
              - 'vitest.config.integration.ts'
            infra:
              - 'compose.yml'
              - 'infrastructure/**'
              - 'secrets/**'
              - '.sops.yaml'
              - 'scripts/smoke/**'
              - 'Makefile'
            tests:
              - 'tests/e2e/**'
              - 'playwright.config.ts'

  # ── Tier 0: smoke (always runs — catches broken compose / secrets lint) ──
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install python3 + jq (already on ubuntu-latest)
        run: python3 --version && jq --version
      - name: Install PyYAML for healthcheck-declared
        run: pip install --user pyyaml
      - name: Run smoke suite
        run: bash scripts/smoke/run-all.sh

  # ── Tier 1: pure unit ────────────────────────────────────────────────────
  unit:
    needs: changes
    if: needs.changes.outputs.src == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Run unit tier with coverage
        run: npx vitest run --config vitest.config.unit.ts --coverage
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-unit
          path: coverage/unit/coverage-summary.json
          retention-days: 14

  # ── Tier 2: component (RTL + jsdom) ──────────────────────────────────────
  component:
    needs: changes
    if: needs.changes.outputs.components == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Run component tier with coverage
        run: npx vitest run --config vitest.config.component.ts --coverage
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-component
          path: coverage/component/coverage-summary.json
          retention-days: 14

  # ── Tier 3: backend unit (Node) ──────────────────────────────────────────
  backend-unit:
    needs: changes
    if: needs.changes.outputs.backend == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Install tricho-auth deps
        working-directory: infrastructure/couchdb/tricho-auth
        run: npm ci
      - name: Install mock-oidc deps
        working-directory: infrastructure/mock-oidc
        run: npm install
      - name: Run backend unit tier with coverage
        run: npx vitest run --config vitest.config.backend.ts --coverage
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-backend
          path: coverage/backend/coverage-summary.json
          retention-days: 14

  # ── Tier 4: backend integration (real CouchDB via testcontainers) ────────
  backend-integ:
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.infra == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      # ubuntu-latest has Docker preinstalled but testcontainers works
      # better with a warm daemon. No extra services needed here.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Install tricho-auth deps
        working-directory: infrastructure/couchdb/tricho-auth
        run: npm ci
      - name: Run backend integration tier
        run: npx vitest run --config vitest.config.integration.ts

  # ── Tier 5: E2E (Playwright against the ci compose profile) ──────────────
  # Migrated from the old e2e.yml; secrets-lint lives in the smoke job.
  e2e:
    needs: [changes, smoke]
    if: |
      needs.changes.outputs.src == 'true' ||
      needs.changes.outputs.components == 'true' ||
      needs.changes.outputs.backend == 'true' ||
      needs.changes.outputs.infra == 'true' ||
      needs.changes.outputs.tests == 'true' ||
      github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install SOPS + age + jq
        run: |
          set -eu
          SOPS_VERSION=3.9.1
          AGE_VERSION=1.2.0
          curl -sfLo /tmp/sops "https://github.com/getsops/sops/releases/download/v${SOPS_VERSION}/sops-v${SOPS_VERSION}.linux.amd64"
          sudo install -m 0755 /tmp/sops /usr/local/bin/sops
          curl -sfL "https://github.com/FiloSottile/age/releases/download/v${AGE_VERSION}/age-v${AGE_VERSION}-linux-amd64.tar.gz" | tar -xz -C /tmp
          sudo install -m 0755 /tmp/age/age /usr/local/bin/age
          sudo install -m 0755 /tmp/age/age-keygen /usr/local/bin/age-keygen
          sudo apt-get update && sudo apt-get install -y --no-install-recommends jq
      - name: Map tricho.test to localhost
        run: echo '127.0.0.1 tricho.test' | sudo tee -a /etc/hosts
      - run: npm ci
      - uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - run: npx playwright install --with-deps chromium
      - name: Decrypt CI secrets
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
        run: |
          if [ -z "${SOPS_AGE_KEY:-}" ]; then
            echo "SOPS_AGE_KEY secret unset — configure it in GitHub repo secrets" >&2
            exit 1
          fi
          PROFILE=ci make _render-secrets
      - name: Bring up ci stack
        env:
          COMPOSE_PROJECT_NAME: tricho-e2e-${{ github.run_id }}
          APP_HOST: tricho.test
          APP_ORIGIN: https://tricho.test
          GOOGLE_ISSUER_URL: http://mock-oidc:8080
          GOOGLE_CLIENT_ID: mock-client
          GOOGLE_REDIRECT_URI: https://tricho.test/auth/google/callback
        run: |
          docker compose -f compose.yml --env-file .env --profile ci up -d --build
          for i in $(seq 1 60); do
            if curl -skf https://tricho.test/auth/health >/dev/null; then
              echo "stack healthy"
              exit 0
            fi
            sleep 2
          done
          echo "stack did not become healthy within 120s" >&2
          docker compose -p $COMPOSE_PROJECT_NAME logs --tail=200
          exit 1
      - name: Run Playwright
        env:
          COMPOSE_PROJECT_NAME: tricho-e2e-${{ github.run_id }}
          E2E_BASE_URL: https://tricho.test
        run: npx playwright test
      - name: Collect docker logs on failure
        if: failure()
        env:
          COMPOSE_PROJECT_NAME: tricho-e2e-${{ github.run_id }}
        run: |
          mkdir -p docker-logs
          for svc in $(docker compose -p $COMPOSE_PROJECT_NAME ps --services 2>/dev/null); do
            docker compose -p $COMPOSE_PROJECT_NAME logs --no-color --tail=all "$svc" > "docker-logs/${svc}.log" 2>&1 || true
          done
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 14
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: docker-logs
          path: docker-logs/
          retention-days: 14
      - name: Tear down
        if: always()
        env:
          COMPOSE_PROJECT_NAME: tricho-e2e-${{ github.run_id }}
        run: docker compose -f compose.yml --env-file .env --profile ci down -v

  # ── Coverage gate: compares tier summaries against committed baseline ────
  coverage-gate:
    needs: [unit, component, backend-unit]
    if: always() && (needs.unit.result == 'success' || needs.component.result == 'success' || needs.backend-unit.result == 'success')
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Download unit coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-unit
          path: coverage/unit
        continue-on-error: true
      - name: Download component coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-component
          path: coverage/component
        continue-on-error: true
      - name: Download backend coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-backend
          path: coverage/backend
        continue-on-error: true
      - name: Diff vs committed baseline
        run: node scripts/coverage/diff-vs-baseline.mjs
