name: E2E (Playwright against unified stack)

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secrets-lint:
    # Fast gate — fails if anyone commits a plaintext .env (outside the
    # documented .env.example / .env.defaults names).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Reject plaintext secrets
        run: |
          set -eu
          # Any committed file whose path matches .env or .env.* EXCEPT the
          # documented templates is a lint failure.
          bad=$(git ls-files | grep -E '(^|/)\.env(\..+)?$' | \
                grep -Ev '^\.env$|\.env\.example$|\.env\.defaults$|secrets/.*\.fallback\.env$' || true)
          if [ -n "$bad" ]; then
            echo "Unexpected plaintext .env files committed:" >&2
            echo "$bad" >&2
            echo "Move their contents into secrets/<profile>.sops.yaml and delete." >&2
            exit 1
          fi
          echo "secrets-lint OK"

  e2e:
    needs: secrets-lint
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install SOPS + age + jq
        run: |
          set -eu
          SOPS_VERSION=3.9.1
          AGE_VERSION=1.2.0
          curl -sfLo /tmp/sops "https://github.com/getsops/sops/releases/download/v${SOPS_VERSION}/sops-v${SOPS_VERSION}.linux.amd64"
          sudo install -m 0755 /tmp/sops /usr/local/bin/sops
          curl -sfL "https://github.com/FiloSottile/age/releases/download/v${AGE_VERSION}/age-v${AGE_VERSION}-linux-amd64.tar.gz" | tar -xz -C /tmp
          sudo install -m 0755 /tmp/age/age /usr/local/bin/age
          sudo install -m 0755 /tmp/age/age-keygen /usr/local/bin/age-keygen
          sudo apt-get update && sudo apt-get install -y --no-install-recommends jq
          sops --version
          age --version
          jq --version

      - name: Map tricho.test to localhost
        run: echo '127.0.0.1 tricho.test' | sudo tee -a /etc/hosts

      - name: Install npm dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright chromium
        run: npx playwright install --with-deps chromium

      - name: Decrypt CI secrets
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
        run: |
          if [ -z "${SOPS_AGE_KEY:-}" ]; then
            echo "SOPS_AGE_KEY secret is unset — configure it in GitHub repo secrets" >&2
            exit 1
          fi
          PROFILE=ci make _render-secrets

      - name: Bring up ci stack
        env:
          COMPOSE_PROJECT_NAME: tricho-e2e-${{ github.run_id }}
          GOOGLE_ISSUER_URL: http://mock-oidc:8080
          GOOGLE_CLIENT_ID: mock-client
          GOOGLE_REDIRECT_URI: https://tricho.test/auth/google/callback
        run: |
          docker compose -f compose.yml --env-file .env --profile ci up -d --build
          for i in $(seq 1 60); do
            if curl -skf https://tricho.test/auth/health >/dev/null; then
              echo "stack healthy"
              exit 0
            fi
            sleep 2
          done
          echo "stack did not become healthy within 120s" >&2
          docker compose -p $COMPOSE_PROJECT_NAME logs --tail=200
          exit 1

      - name: Run Playwright
        env:
          COMPOSE_PROJECT_NAME: tricho-e2e-${{ github.run_id }}
        run: npx playwright test

      - name: Collect docker logs
        if: always()
        env:
          COMPOSE_PROJECT_NAME: tricho-e2e-${{ github.run_id }}
        run: |
          mkdir -p docker-logs
          for svc in $(docker compose -p $COMPOSE_PROJECT_NAME ps --services 2>/dev/null); do
            docker compose -p $COMPOSE_PROJECT_NAME logs --no-color --tail=all "$svc" > "docker-logs/${svc}.log" 2>&1 || true
          done

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 14

      - name: Upload docker logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docker-logs
          path: docker-logs/
          retention-days: 14

      - name: Tear down
        if: always()
        env:
          COMPOSE_PROJECT_NAME: tricho-e2e-${{ github.run_id }}
        run: docker compose -f compose.yml --env-file .env --profile ci down -v
