; TrichoApp CouchDB overrides
; Merged into /opt/couchdb/etc/default.d/ at startup.
;
; NOTE: [jwt_keys] is NO LONGER in this file. The tricho-auth container
; publishes its current JWT public key to a shared volume on every start,
; and CouchDB's entrypoint shim (infrastructure/couchdb/entrypoint.sh)
; templates it into /opt/couchdb/etc/local.d/jwt.ini before CouchDB boots.
; Rotating the key is now: replace the tricho-auth JWT private key, then
; `docker compose restart tricho-auth couchdb`.

[couchdb]
single_node = true

[chttpd]
enable_cors = true
bind_address = 0.0.0.0
; JWT is the only accepted session credential. `default_authentication_handler`
; stays for admin Basic auth used by tricho-auth on the internal network only.
; Cookie auth is intentionally removed — clients carry a short-lived Bearer
; JWT and refresh through tricho-auth, not CouchDB.
authentication_handlers = {chttpd_auth, jwt_authentication_handler}, {chttpd_auth, default_authentication_handler}

[couch_peruser]
enable = true
delete_dbs = false

[cors]
credentials = true
origins = *
methods = GET, PUT, POST, HEAD, DELETE
headers = accept, authorization, content-type, origin, referer, x-csrf-token

[httpd]
WWW-Authenticate = Basic realm="tricho"

; JWT-authentication configuration.
; `sub` = the CouchDB username that the JWT authorises. tricho-auth issues
; tokens with this claim set to the canonical OAuth-derived username.
[jwt_auth]
required_claims = sub, exp
roles_claim_name = _couchdb.roles
